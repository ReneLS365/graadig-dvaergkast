name: GRÅDIG CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run check
      - run: npm run balance:check
      - run: npm run smoke
      - run: npm run smoke:browser
      - run: npm run build
      - run: npm run simulate
